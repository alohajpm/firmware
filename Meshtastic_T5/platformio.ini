[env:lilygo-t5-s3-pro]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  meshtastic/Meshtastic-esp32 @ ^2.2.21
  ; Add other necessary libraries here (LilyGO libraries, etc.)
build_flags =
  -DBOARD_HAS_PSRAM ; if needed
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -D HAS_LORA=1
  -D USE_DISPLAY=1
  -D HAS_RTC=1
  -D HAS_ACCELEROMETER=1
  -D HAS_BUTTON=1
  -D HAS_BATTERYADC=1
  -D BATTERY_MULTIPLIER=1.7
  -D LILYGO_T5_V2_1_3=1
  -D HAS_DISPLAY=1
  -D USE_DISPLAY=1
  -D LILYGO_T5_V2_3=1
  -D GxGDEW047C80=1
  -D GxIO_Class=1
  -D GxEPD_Class=1
  -D SPI_MOSI=11
  -D SPI_MISO=13
  -D SPI_SCK=12
  -D EPD_CS=9
  -D EPD_DC=8
  -D EPD_RST=7
  -D EPD_BUSY=6
  -D TOUCH_SDA=4
  -D TOUCH_SCL=5
  -D TOUCH_RST=0
  -D TOUCH_IRQ=1
  -D LORA_SCK=12
  -D LORA_MISO=13
  -D LORA_MOSI=11
  -D LORA_CS=10
  -D LORA_RST=21
  -D LORA_IRQ=39
  -D LORA_BUSY=38
  -D LORA_REGION=US915 ; Change to your region
  -D LORA_PREAMBLE_LEN=20
  -D LORA_CODING_RATE=7
  -D LORA_SIGNAL_BANDWIDTH=125000
  -D LORA_SPREADING_FACTOR=7
  -D LORA_TX_POWER=14
  -D LORA_CHANNEL_NUM=3
  -D USER_NAME="T5 User"
  -D SHORT_NAME="T5"
  -D LONG_NAME="T5 User"
  -D SOFTWARE_VERSION=0.0.1